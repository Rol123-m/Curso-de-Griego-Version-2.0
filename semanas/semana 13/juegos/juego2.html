<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tempus Praeteritum - Empareja el Imperfecto Griego</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a2e38, #0a1a2a);
            min-height: 100vh;
            padding: 20px;
            color: #e0f2fe;
        }

        .game-header {
            text-align: center;
            padding: 20px 20px 10px;
        }

        .game-header h1 {
            font-size: clamp(1.5rem, 6vw, 2.6rem);
            background: linear-gradient(135deg, #2dd4bf, #14b8a6, #0d9488);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .sub {
            color: #5eead4;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        /* Barra superior */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 46, 46, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 10px 24px;
            margin: 20px auto;
            max-width: 700px;
            border: 1px solid #2dd4bf;
            flex-wrap: wrap;
            gap: 12px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0a2e2e;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
        }

        .stat .value {
            color: #2dd4bf;
            font-size: 1.3rem;
            font-weight: 700;
        }

        /* Tablero de juego - estilo Duolingo */
        .game-board {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(15, 46, 46, 0.4);
            border-radius: 48px;
            padding: 25px;
            backdrop-filter: blur(8px);
        }

        .match-counter {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        .match-counter span {
            background: #0f5e5e;
            padding: 6px 20px;
            border-radius: 30px;
            display: inline-block;
        }

        /* Columnas lado a lado */
        .columns-wrapper {
            display: flex;
            flex-direction: row;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .column {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .column h3 {
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 2px solid #2dd4bf;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .card {
            background: linear-gradient(145deg, #134e4a, #0f3a3a);
            border: 2px solid #2dd4bf;
            border-radius: 20px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: clamp(0.9rem, 4vw, 1rem);
        }

        .card.greek {
            font-family: 'Times New Roman', 'Palatino', serif;
            font-size: 1.1rem;
            background: linear-gradient(145deg, #1a5a5a, #0f4a4a);
            border-left: 6px solid #fbbf24;
        }

        .card.spanish {
            border-right: 6px solid #fbbf24;
        }

        .card.selected {
            background: #2dd4bf;
            color: #0a2e2e;
            border-color: white;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(45, 212, 191, 0.5);
        }

        .card.matched {
            background: #166534;
            border-color: #22c55e;
            cursor: default;
            opacity: 0.7;
            text-decoration: line-through;
            pointer-events: none;
        }

        .card.matched::after {
            content: " ✓";
            font-weight: bold;
            color: #22c55e;
        }

        /* Botón siguiente nivel */
        .next-level-btn {
            background: linear-gradient(135deg, #2dd4bf, #0d9488);
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #0a2e2e;
            cursor: pointer;
            margin-top: 30px;
            width: 100%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .next-level-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .next-level-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(45, 212, 191, 0.4);
        }

        /* Modal victoria */
        .victory-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.4s;
        }

        .victory-card {
            background: linear-gradient(145deg, #134e4a, #0a2e2e);
            border-radius: 48px;
            padding: 35px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 2px solid #fbbf24;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 640px) {
            .columns-wrapper { flex-direction: column; }
            .column { min-width: auto; }
            .game-board { padding: 15px; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="game-header">
        <h1><i class="fas fa-hourglass-start"></i> TEMPUS PRAETERITUM <i class="fas fa-hourglass-end"></i></h1>
        <div class="sub">⋆ Asocia cada forma griega en imperfecto con su traducción correcta ⋆</div>
    </div>

    <div class="top-bar">
        <div class="stat"><i class="fas fa-crown"></i><span>NIVEL</span><span class="value" id="levelNum">1</span><span>/3</span></div>
        <div class="stat"><i class="fas fa-check-circle"></i><span>ACIERTOS</span><span class="value" id="matchedCount">0</span><span>/<span id="totalPairs">0</span></span></div>
        <div class="stat"><i class="fas fa-star"></i><span>PUNTOS</span><span class="value" id="scoreValue">0</span></div>
    </div>

    <div class="game-board" id="gameBoard">
        <div class="match-counter"><span><i class="fas fa-hand-pointer"></i> Haz clic en una palabra griega y luego en su traducción</span></div>
        <div class="columns-wrapper" id="columnsWrapper"></div>
        <button class="next-level-btn" id="nextBtn" disabled><i class="fas fa-arrow-right"></i> Siguiente Nivel <i class="fas fa-arrow-left"></i></button>
    </div>

    <script>
        const levels = [
            { name: "Nivel 1: Imperfecto Básico", pairs: [
                { greek: "ἔλυον", spanish: "yo soltaba / estaba soltando" },
                { greek: "ἔλυες", spanish: "tú soltabas / estabas soltando" },
                { greek: "ἔλυε(ν)", spanish: "él/ella soltaba / estaba soltando" },
                { greek: "ἐλύομεν", spanish: "nosotros soltábamos" },
                { greek: "ἐλύετε", spanish: "vosotros soltabais" }
            ]},
            { name: "Nivel 2: Verbos Contractos y εἰμί", pairs: [
                { greek: "ἠγάπων", spanish: "yo amaba / estaba amando" },
                { greek: "ἐποίουν", spanish: "yo hacía / estaba haciendo" },
                { greek: "ἐπλήρουν", spanish: "yo cumplía / estaba cumpliendo" },
                { greek: "ἦν", spanish: "él/ella era / estaba" },
                { greek: "ἤμην", spanish: "yo era / estaba" }
            ]},
            { name: "Nivel 3: Verbos Compuestos y Deponentes", pairs: [
                { greek: "κατέβαινον", spanish: "yo descendía / bajaba" },
                { greek: "ἐξέβαλλον", spanish: "yo expulsaba / echaba fuera" },
                { greek: "περιεπάτουν", spanish: "yo caminaba alrededor" },
                { greek: "ἠρχόμην", spanish: "yo venía / iba viniendo" },
                { greek: "ἐβαπτίζοντο", spanish: "ellos eran bautizados" }
            ]}
        ];

        let currentLevel = 0;
        let currentPairs = [];
        let matchedGreek = [];
        let matchedSpanish = [];
        let selectedCard = null;
        let selectedType = null;
        let selectedIndex = null;
        let score = 0;

        const gameBoard = document.getElementById('gameBoard');
        const columnsWrapper = document.getElementById('columnsWrapper');
        const nextBtn = document.getElementById('nextBtn');
        const levelNumSpan = document.getElementById('levelNum');
        const matchedCountSpan = document.getElementById('matchedCount');
        const totalPairsSpan = document.getElementById('totalPairs');
        const scoreSpan = document.getElementById('scoreValue');

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function loadLevel() {
            const levelData = levels[currentLevel];
            currentPairs = [...levelData.pairs];
            matchedGreek = [];
            matchedSpanish = [];
            selectedCard = null;
            selectedType = null;
            selectedIndex = null;

            const shuffledGreek = shuffleArray([...currentPairs]);
            const shuffledSpanish = shuffleArray([...currentPairs]);

            columnsWrapper.innerHTML = `
                <div class="column"><h3><i class="fas fa-language"></i> 🇬🇷 GRIEGO (Imperfecto)</h3><div id="greekCol"></div></div>
                <div class="column"><h3><i class="fas fa-language"></i> 🇪🇸 ESPAÑOL</h3><div id="spanishCol"></div></div>
            `;
            const greekCol = document.getElementById('greekCol');
            const spanishCol = document.getElementById('spanishCol');

            shuffledGreek.forEach((pair, idx) => {
                const originalIdx = currentPairs.findIndex(p => p.greek === pair.greek && p.spanish === pair.spanish);
                const card = document.createElement('div');
                card.className = 'card greek';
                card.textContent = pair.greek;
                card.setAttribute('data-type', 'greek');
                card.setAttribute('data-index', originalIdx);
                card.addEventListener('click', () => handleCardClick('greek', originalIdx, card));
                greekCol.appendChild(card);
            });

            shuffledSpanish.forEach((pair, idx) => {
                const originalIdx = currentPairs.findIndex(p => p.spanish === pair.spanish);
                const card = document.createElement('div');
                card.className = 'card spanish';
                card.textContent = pair.spanish;
                card.setAttribute('data-type', 'spanish');
                card.setAttribute('data-index', originalIdx);
                card.addEventListener('click', () => handleCardClick('spanish', originalIdx, card));
                spanishCol.appendChild(card);
            });

            levelNumSpan.textContent = currentLevel + 1;
            totalPairsSpan.textContent = currentPairs.length;
            matchedCountSpan.textContent = '0';
            nextBtn.disabled = true;
        }

        function updateStats() {
            matchedCountSpan.textContent = matchedGreek.length;
            scoreSpan.textContent = score;
            if (matchedGreek.length === currentPairs.length) {
                nextBtn.disabled = false;
            }
        }

        function clearSelection() {
            document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
            selectedCard = null;
            selectedType = null;
            selectedIndex = null;
        }

        function handleCardClick(type, idx, element) {
            if ((type === 'greek' && matchedGreek.includes(idx)) || (type === 'spanish' && matchedSpanish.includes(idx))) return;

            if (selectedCard === null) {
                clearSelection();
                selectedCard = element;
                selectedType = type;
                selectedIndex = idx;
                element.classList.add('selected');
                return;
            }

            const firstType = selectedType;
            const firstIdx = selectedIndex;
            const firstElem = selectedCard;

            if (firstType === type) {
                clearSelection();
                selectedCard = element;
                selectedType = type;
                selectedIndex = idx;
                element.classList.add('selected');
                return;
            }

            let greekIdx, spanishIdx, greekElem, spanishElem;
            if (firstType === 'greek' && type === 'spanish') {
                greekIdx = firstIdx; spanishIdx = idx;
                greekElem = firstElem; spanishElem = element;
            } else {
                greekIdx = idx; spanishIdx = firstIdx;
                greekElem = element; spanishElem = firstElem;
            }

            if (matchedGreek.includes(greekIdx) || matchedSpanish.includes(spanishIdx)) {
                clearSelection();
                return;
            }

            const expectedSpanish = currentPairs[greekIdx]?.spanish;
            const selectedSpanish = currentPairs[spanishIdx]?.spanish;

            if (expectedSpanish === selectedSpanish) {
                matchedGreek.push(greekIdx);
                matchedSpanish.push(spanishIdx);
                greekElem.classList.add('matched');
                spanishElem.classList.add('matched');
                score += 10;
                updateStats();
                clearSelection();
            } else {
                score = Math.max(0, score - 3);
                updateStats();
                greekElem.classList.add('selected');
                spanishElem.classList.add('selected');
                setTimeout(() => {
                    greekElem.classList.remove('selected');
                    spanishElem.classList.remove('selected');
                }, 600);
                clearSelection();
            }
        }

        function nextLevel() {
            if (matchedGreek.length !== currentPairs.length) return;
            if (currentLevel + 1 < levels.length) {
                currentLevel++;
                loadLevel();
            } else {
                showVictory();
            }
        }

        function showVictory() {
            const modal = document.createElement('div');
            modal.className = 'victory-modal';
            modal.innerHTML = `<div class="victory-card"><i class="fas fa-trophy" style="font-size: 3.5rem; color: #fbbf24;"></i><h2 style="margin: 15px 0;">¡Victoria!</h2><p style="font-size: 2rem; color: #2dd4bf;">${score} pts</p><p>Has dominado el imperfecto griego.</p><button class="next-level-btn" id="restartGameBtn" style="margin-top: 20px; background: #fbbf24; color: #0a2e2e;"><i class="fas fa-play"></i> Jugar de nuevo</button></div>`;
            document.body.appendChild(modal);
            document.getElementById('restartGameBtn').addEventListener('click', () => { modal.remove(); resetGame(); });
        }

        function resetGame() {
            currentLevel = 0;
            score = 0;
            loadLevel();
        }

        nextBtn.addEventListener('click', nextLevel);
        loadLevel();
    </script>
</body>
</html>

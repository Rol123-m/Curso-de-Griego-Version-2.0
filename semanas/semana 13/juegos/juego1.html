<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Imperfectum Imperium - Domina el Imperfecto Griego</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: linear-gradient(145deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            padding: 20px;
            color: #f1f5f9;
        }

        /* Header del juego */
        .game-header {
            text-align: center;
            padding: 20px 20px 10px;
        }

        .game-header h1 {
            font-size: clamp(1.6rem, 6vw, 2.8rem);
            background: linear-gradient(135deg, #c084fc, #a855f7, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .sub {
            color: #a78bfa;
            font-size: 0.9rem;
            margin-top: 8px;
            border-top: 1px solid #334155;
            display: inline-block;
            padding-top: 10px;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 10px 24px;
            margin: 20px auto;
            max-width: 700px;
            border: 1px solid #4c1d95;
            flex-wrap: wrap;
            gap: 12px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1e1b4b;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .stat i {
            font-size: 1.2rem;
        }

        .stat .value {
            color: #c084fc;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .score {
            background: linear-gradient(135deg, #c084fc, #a855f7);
            color: #0f172a;
        }
        .score .value { color: #0f172a; }

        .lives { border: 1px solid #ef4444; }
        .lives i { color: #ef4444; }

        /* Contenedor de preguntas */
        .quiz-container {
            max-width: 900px;
            margin: 0 auto 40px;
        }

        .question-card {
            background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
            border-radius: 32px;
            padding: 28px;
            margin-bottom: 25px;
            border: 1px solid #4c1d95;
            transition: all 0.3s ease;
            box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.5);
        }

        .question-card.correct-highlight {
            border-left: 6px solid #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }

        .question-card.wrong-highlight {
            border-left: 6px solid #ef4444;
        }

        .question-text {
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge {
            background: #7c3aed;
            color: white;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .greek-highlight {
            font-family: 'Times New Roman', 'Palatino', serif;
            font-size: 1.4rem;
            background: #2d2a5e;
            padding: 4px 14px;
            border-radius: 40px;
            letter-spacing: 1px;
        }

        /* Opciones estilo moderno */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: #2d2a5e;
            border: 2px solid #4c1d95;
            border-radius: 20px;
            padding: 14px 18px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option-btn:hover:not(:disabled) {
            background: #4c1d95;
            border-color: #c084fc;
            transform: translateX(6px);
        }

        .option-btn.selected {
            background: linear-gradient(135deg, #c084fc, #a855f7);
            border-color: #c084fc;
            color: #0f172a;
            font-weight: 600;
        }

        .option-btn.correct-answer {
            background: #22c55e;
            border-color: #22c55e;
            color: white;
        }

        .option-btn.wrong-answer {
            background: #ef4444;
            border-color: #ef4444;
            color: white;
            text-decoration: line-through;
        }

        .option-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .prefix {
            font-weight: 800;
            font-size: 1.1rem;
            width: 28px;
        }

        /* Feedback */
        .feedback {
            padding: 14px;
            border-radius: 20px;
            margin-top: 15px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideUp 0.3s ease;
        }

        .feedback.correct {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid #22c55e;
            color: #bbf7d0;
        }

        .feedback.wrong {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            color: #fecaca;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Botones */
        .game-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px auto;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #c084fc, #7c3aed);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.5);
        }

        .btn-secondary {
            background: #334155;
            color: #f1f5f9;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        /* Modal final */
        .results-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.4s ease;
        }

        .results-card {
            background: linear-gradient(145deg, #1e1b4b, #0f172a);
            border-radius: 48px;
            padding: 35px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            border: 1px solid #c084fc;
        }

        .results-card h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 20px 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 640px) {
            .question-card { padding: 20px; }
            .options-grid { grid-template-columns: 1fr; }
            .stats-bar { flex-direction: column; border-radius: 28px; }
            .stat { width: 100%; justify-content: center; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="game-header">
        <h1><i class="fas fa-landmark"></i> IMPERFECTUM IMPERIUM <i class="fas fa-scroll"></i></h1>
        <div class="sub">🏛️ Conquista el tiempo pasado continuo del griego koiné 🏛️</div>
    </div>

    <div class="stats-bar">
        <div class="stat score"><i class="fas fa-star"></i><span>PUNTOS</span><span class="value" id="scoreValue">0</span></div>
        <div class="stat lives"><i class="fas fa-heart"></i><span>VIDAS</span><span class="value" id="livesValue">3</span></div>
        <div class="stat"><i class="fas fa-question-circle"></i><span>PREGUNTA</span><span class="value" id="currentQ">1</span><span>/<span id="totalQ">12</span></span></div>
    </div>

    <div class="quiz-container" id="quizContainer"></div>

    <div class="game-controls">
        <button class="btn btn-secondary" id="resetBtn"><i class="fas fa-undo-alt"></i> Reiniciar Juego</button>
    </div>

    <script>
        const questions = [
            { text: "¿Qué aspecto describe el imperfecto en griego?", options: ["Acción puntual en el pasado", "Acción continua o repetitiva en el pasado", "Acción futura", "Acción completada"], correct: 1, explanation: "El imperfecto describe una acción continua, habitual o en progreso en el pasado." },
            { text: "¿Cuál es la 1ª persona singular del imperfecto activo de λύω?", options: ["λύω", "ἔλυον", "ἔλυσα", "λύσω"], correct: 1, explanation: "ἔλυον es la 1ª sg del imperfecto activo de λύω." },
            { text: "¿Qué elemento caracteriza a los tiempos secundarios como el imperfecto?", options: ["El aumento (ἐ- al principio)", "Desinencias primarias", "Vocal temática ο/ε", "Reduplicación"], correct: 0, explanation: "El aumento (ἐ-) es la marca de tiempo pasado en los tiempos secundarios." },
            { text: "¿Cómo se forma el imperfecto de ἀγαπάω (verbo contracto en α)?", options: ["ἀγαπάον", "ἠγάπων", "ἠγάπησα", "ἀγαπήσω"], correct: 1, explanation: "ἀγαπάω → aumento ἠ- + tema ἀγαπα- → ἠγαπ- + vocal ο/ε + desinencias: ἠγάπων." },
            { text: "¿Cuál es la 3ª persona singular del imperfecto de εἰμί (ser/estar)?", options: ["ἤμην", "ἦς", "ἦν", "ἦσαν"], correct: 2, explanation: "ἦν es la 3ª persona singular del imperfecto de εἰμί." },
            { text: "¿Dónde se coloca el aumento en los verbos compuestos como καταβαίνω?", options: ["Al principio del verbo", "Después de la preposición", "Al final del verbo", "Entre la raíz y la desinencia"], correct: 1, explanation: "En verbos compuestos, el aumento va después de la preposición: κατέβαινον." },
            { text: "¿Qué desinencia corresponde a la 3ª persona plural del imperfecto medio/pasivo?", options: ["-ντο", "-το", "-νται", "-μεθα"], correct: 0, explanation: "La desinencia -ντο es para 3ª plural medio/pasiva en imperfecto." },
            { text: "¿Cómo se traduce correctamente 'ἐβαπτίζοντο' en Mateo 3:6?", options: ["Bautizaron", "Estaban siendo bautizados", "Bautizarán", "Han bautizado"], correct: 1, explanation: "Es imperfecto pasivo: 'eran bautizados / estaban siendo bautizados'." },
            { text: "¿Qué sucede con la preposición en κατά + ἔβαινον?", options: ["La α se convierte en ε", "La α desaparece (κατέβαινον)", "La α se alarga a η", "No hay cambio"], correct: 1, explanation: "La vocal final de la preposición (α) se elimina: κατέβαινον." },
            { text: "¿Cuál es la desinencia de 2ª persona singular del imperfecto activo?", options: ["-ν", "-ς", "-τε", "-μεν"], correct: 1, explanation: "La desinencia secundaria activa para 2ª sg es -ς (ej. ἔλυες)." },
            { text: "¿Cómo se aumenta el verbo εὑρίσκω (encontrar)?", options: ["ηὕρισκον", "εὕρισκον", "ἐὕρισκον", "εὕρηκα"], correct: 1, explanation: "Verbos que comienzan con ευ a menudo no muestran aumento: εὕρισκον." },
            { text: "¿Qué indican las desinencias secundarias en un verbo?", options: ["Tiempo presente", "Tiempo pasado (con aumento)", "Tiempo futuro", "Modo subjuntivo"], correct: 1, explanation: "Las desinencias secundarias siempre van acompañadas de aumento e indican tiempo pasado." }
        ];

        let currentIndex = 0, score = 0, lives = 3, answered = false, gameActive = true;
        const quizContainer = document.getElementById('quizContainer');
        const scoreSpan = document.getElementById('scoreValue');
        const livesSpan = document.getElementById('livesValue');
        const currentQSpan = document.getElementById('currentQ');
        const totalQSpan = document.getElementById('totalQ');

        totalQSpan.textContent = questions.length;

        function updateUI() {
            scoreSpan.textContent = score;
            livesSpan.textContent = lives;
            currentQSpan.textContent = currentIndex + 1;
        }

        function showResults() {
            const percent = Math.round((score / (questions.length * 10)) * 100);
            let msg = percent >= 80 ? "🏆 ¡Imperator! Dominas el imperfecto. 🏆" : percent >= 60 ? "📜 Bien hecho. Sigue practicando." : "⚔️ Necesitas más entrenamiento en el Imperfectum Imperium.";
            const modal = document.createElement('div');
            modal.className = 'results-modal';
            modal.innerHTML = `<div class="results-card"><i class="fas fa-trophy" style="font-size: 3.5rem; color: #c084fc;"></i><h2>Batalla Finalizada</h2><div class="final-score">${score} / ${questions.length * 10}</div><p>${msg}</p><button class="btn btn-primary" id="closeResultsBtn" style="margin-top: 20px;"><i class="fas fa-play"></i> Jugar de nuevo</button></div>`;
            document.body.appendChild(modal);
            document.getElementById('closeResultsBtn').addEventListener('click', () => { modal.remove(); resetGame(); });
        }

        function checkGameOver() { if (lives <= 0 && gameActive) { gameActive = false; showResults(); } }

        function loadQuestion() {
            if (!gameActive) return;
            if (currentIndex >= questions.length) { showResults(); return; }
            answered = false;
            const q = questions[currentIndex];
            let html = `<div class="question-card" id="questionCard"><div class="question-text"><span class="badge"><i class="fas fa-hourglass-half"></i> Desafío ${currentIndex+1}</span><span class="greek-highlight">${q.text.includes('λύω') || q.text.includes('ἀγαπάω') ? '🇬🇷' : '📖'}</span><span>${q.text}</span></div><div class="options-grid" id="optionsGrid">`;
            q.options.forEach((opt, idx) => { html += `<button class="option-btn" data-opt-index="${idx}"><span class="prefix">${String.fromCharCode(65+idx)}.</span><span>${opt}</span></button>`; });
            html += `</div><div class="feedback" id="feedback"></div></div>`;
            quizContainer.innerHTML = html;
            document.querySelectorAll('.option-btn').forEach(btn => btn.addEventListener('click', () => selectAnswer(parseInt(btn.dataset.optIndex))));
            updateUI();
        }

        function selectAnswer(optIndex) {
            if (answered || !gameActive) return;
            answered = true;
            const q = questions[currentIndex];
            const isCorrect = (optIndex === q.correct);
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(btn => btn.disabled = true);
            if (isCorrect) {
                score += 10;
                updateUI();
                btns[optIndex].classList.add('correct-answer');
                document.getElementById('feedback').innerHTML = `<i class="fas fa-check-circle"></i> ¡Correcto! ${q.explanation}`;
                document.getElementById('feedback').className = 'feedback correct';
                document.getElementById('questionCard').classList.add('correct-highlight');
            } else {
                lives--;
                updateUI();
                btns[optIndex].classList.add('wrong-answer');
                btns[q.correct].classList.add('correct-answer');
                document.getElementById('feedback').innerHTML = `<i class="fas fa-times-circle"></i> Incorrecto. ${q.explanation}`;
                document.getElementById('feedback').className = 'feedback wrong';
                document.getElementById('questionCard').classList.add('wrong-highlight');
                checkGameOver();
            }
            setTimeout(() => {
                if (gameActive && lives > 0) { currentIndex++; loadQuestion(); }
                else if (lives <= 0) { if (!document.querySelector('.results-modal')) showResults(); }
                else if (currentIndex >= questions.length) showResults();
            }, 1800);
        }

        function resetGame() { currentIndex = 0; score = 0; lives = 3; answered = false; gameActive = true; updateUI(); loadQuestion(); }
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        loadQuestion();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preposiciones del Griego Koiné - Ministerio Vivos para Servir</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #2C3E50;
      --secondary: #E74C3C;
      --accent: #3498DB;
      --light: #ECF0F1;
      --dark: #1A252F;
      --success: #27AE60;
      --warning: #F39C12;
      --gold: #F1C40F;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #1A252F 0%, #2C3E50 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: white;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      width: 100%;
      max-width: 800px;
    }

    .ministry-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .logo-container {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
      background: white;
      padding: 10px;
      box-shadow: var(--shadow);
      border: 4px solid var(--gold);
      transition: var(--transition);
    }

    .logo:hover {
      transform: rotate(5deg) scale(1.05);
    }

    .ministry-title {
      text-align: center;
    }

    .ministry-title h1 {
      color: var(--gold);
      font-size: 2.2rem;
      margin-bottom: 8px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      letter-spacing: 1px;
    }

    .ministry-title .subtitle {
      color: var(--light);
      font-size: 1.1rem;
      opacity: 0.9;
      font-weight: 300;
    }

    .game-title {
      text-align: center;
      margin-top: 20px;
    }

    .game-title h2 {
      font-size: 2.8rem;
      color: white;
      margin-bottom: 10px;
      background: linear-gradient(to right, var(--gold), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .game-title p {
      color: var(--light);
      font-size: 1.1rem;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .game-container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 25px;
      padding: 40px;
      width: 100%;
      max-width: 800px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .game-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(to right, var(--gold), var(--secondary));
    }

    .question-container {
      text-align: center;
      margin-bottom: 40px;
    }

    .question-title {
      font-size: 1.4rem;
      color: var(--light);
      margin-bottom: 25px;
      font-weight: 500;
    }

    .greek-word {
      font-family: 'New Athena Unicode', 'Times New Roman', serif;
      font-size: 4.5rem;
      color: var(--gold);
      margin: 20px 0;
      text-shadow: 0 4px 8px rgba(0,0,0,0.3);
      padding: 20px;
      background: rgba(0,0,0,0.2);
      border-radius: 15px;
      display: inline-block;
      transition: var(--transition);
    }

    .greek-word:hover {
      transform: translateY(-5px);
      background: rgba(0,0,0,0.3);
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin: 40px 0;
    }

    .option-card {
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 15px;
      padding: 25px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .option-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: 0.5s;
    }

    .option-card:hover::before {
      left: 100%;
    }

    .option-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .option-text {
      font-size: 1.3rem;
      font-weight: 600;
      color: white;
      z-index: 1;
    }

    .feedback-container {
      min-height: 80px;
      margin: 30px 0;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      opacity: 0;
      transform: translateY(20px);
    }

    .feedback-container.show {
      opacity: 1;
      transform: translateY(0);
    }

    .feedback-correct {
      background: rgba(39, 174, 96, 0.2);
      border: 2px solid var(--success);
      color: #2ecc71;
      animation: correctPulse 0.6s ease;
    }

    .feedback-incorrect {
      background: rgba(231, 76, 60, 0.2);
      border: 2px solid var(--secondary);
      color: #e74c3c;
      animation: shake 0.5s;
    }

    .game-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 30px;
      padding-top: 25px;
      border-top: 2px solid rgba(255, 255, 255, 0.1);
    }

    .score-container {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .score-icon {
      font-size: 2rem;
      color: var(--gold);
    }

    .score-text {
      font-size: 1.1rem;
    }

    .score-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .progress-container {
      flex: 1;
      margin: 0 30px;
    }

    .progress-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(to right, var(--gold), var(--accent));
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .counter {
      font-size: 1.1rem;
      color: var(--light);
      min-width: 100px;
    }

    .action-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .btn {
      padding: 18px 40px;
      border: none;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-width: 200px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold) 0%, #F39C12 100%);
      color: var(--dark);
      box-shadow: 0 6px 20px rgba(243, 156, 18, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(243, 156, 18, 0.4);
    }

    .btn-secondary {
      background: linear-gradient(135deg, var(--accent) 0%, #2980B9 100%);
      color: white;
      box-shadow: 0 6px 20px rgba(52, 152, 219, 0.3);
    }

    .btn-secondary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(52, 152, 219, 0.4);
    }

    .btn-hidden {
      display: none;
    }

    .game-over {
      text-align: center;
      padding: 40px;
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      margin-top: 30px;
      animation: fadeIn 0.8s ease;
    }

    .game-over h2 {
      font-size: 3rem;
      color: var(--gold);
      margin-bottom: 20px;
      text-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .final-score {
      font-size: 4rem;
      font-weight: 700;
      color: var(--gold);
      margin: 20px 0;
      text-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .achievement {
      display: inline-block;
      background: linear-gradient(135deg, var(--gold), var(--accent));
      padding: 12px 25px;
      border-radius: 50px;
      margin: 20px 0;
      font-weight: 700;
      color: white;
      box-shadow: var(--shadow);
    }

    @keyframes correctPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .game-title h2 {
        font-size: 2.2rem;
      }
      
      .greek-word {
        font-size: 3.5rem;
        padding: 15px;
      }
      
      .options-grid {
        grid-template-columns: 1fr;
      }
      
      .game-info {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }
      
      .progress-container {
        width: 100%;
      }
      
      .action-buttons {
        flex-direction: column;
        align-items: center;
      }
      
      .btn {
        width: 100%;
        max-width: 300px;
      }
      
      .ministry-header {
        flex-direction: column;
        text-align: center;
      }
      
      .game-container {
        padding: 25px;
      }
    }

    @media (max-width: 480px) {
      .game-title h2 {
        font-size: 1.8rem;
      }
      
      .greek-word {
        font-size: 2.8rem;
      }
      
      .option-card {
        padding: 20px;
      }
      
      .option-text {
        font-size: 1.1rem;
      }
      
      .feedback-container {
        padding: 20px;
        font-size: 1.1rem;
      }
      
      .game-over h2 {
        font-size: 2.2rem;
      }
      
      .final-score {
        font-size: 3rem;
      }
    }

    /* Decoraciones */
    .decoration {
      position: fixed;
      pointer-events: none;
      z-index: -1;
    }

    .decoration-1 {
      top: 10%;
      left: 5%;
      font-size: 2rem;
      color: rgba(255, 255, 255, 0.05);
    }

    .decoration-2 {
      bottom: 10%;
      right: 5%;
      font-size: 2rem;
      color: rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="ministry-header">
      <div class="logo-container">
        <img src="https://i.postimg.cc/wMJ2bCgV/mas-logos.jpg" class="logo" alt="Logo Ministerio Vivos para Servir">
      </div>
      <div class="ministry-title">
        <h1>Ministerio Vivos para Servir</h1>
        <p class="subtitle">Sección Educativa - Aprendiendo Griego Koiné</p>
      </div>
    </div>
    
    <div class="game-title">
      <h2><i class="fas fa-language"></i> Preposiciones del Griego Koiné</h2>
      <p>Identifica el caso que rige cada preposición griega y mejora tu comprensión del Nuevo Testamento</p>
    </div>
  </div>

  <div class="game-container">
    <div id="gameContent">
      <div class="question-container">
        <div class="question-title">¿Qué caso gramatical rige esta preposición?</div>
        <div class="greek-word" id="greekWord">ἐν</div>
      </div>

      <div class="options-grid" id="optionsContainer"></div>

      <div class="feedback-container" id="feedback"></div>

      <div class="game-info">
        <div class="score-container">
          <i class="fas fa-trophy score-icon"></i>
          <div>
            <div class="score-text">Puntaje</div>
            <div class="score-value" id="score">0</div>
          </div>
        </div>

        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
          </div>
          <div class="counter" id="counter">Pregunta 1 de 12</div>
        </div>
      </div>

      <div class="action-buttons">
        <button class="btn btn-primary" id="nextButton" style="display:none;">
          <i class="fas fa-arrow-right"></i> Siguiente Preposición
        </button>
        <button class="btn btn-secondary" id="resetButton">
          <i class="fas fa-redo"></i> Reiniciar
        </button>
      </div>
    </div>
  </div>

  <!-- Decoraciones -->
  <div class="decoration decoration-1">
    <i class="fas fa-cross"></i>
  </div>
  <div class="decoration decoration-2">
    <i class="fas fa-book-bible"></i>
  </div>

  <script>
    // Datos del juego
    const prepositionsData = [
      { word: 'ἐν', case: 'Dativo', note: 'Siempre con dativo, significa "en" o "dentro de"' },
      { word: 'διά', case: 'Genitivo y Acusativo', note: 'Con genitivo: "a través de". Con acusativo: "a causa de"' },
      { word: 'εἰς', case: 'Acusativo', note: 'Siempre con acusativo, significa "hacia" o "para"' },
      { word: 'ἐκ / ἐξ', case: 'Genitivo', note: 'Siempre con genitivo, significa "desde" o "fuera de"' },
      { word: 'ἀπό', case: 'Genitivo', note: 'Siempre con genitivo, significa "desde" o "de"' },
      { word: 'πρός', case: 'Acusativo', note: 'Siempre con acusativo, significa "hacia" o "con"' },
      { word: 'μετά', case: 'Genitivo y Acusativo', note: 'Con genitivo: "con". Con acusativo: "después de"' },
      { word: 'κατά', case: 'Genitivo y Acusativo', note: 'Con genitivo: "contra". Con acusativo: "según"' },
      { word: 'ὑπέρ', case: 'Genitivo y Acusativo', note: 'Con genitivo: "en favor de". Con acusativo: "sobre"' },
      { word: 'ὑπό', case: 'Genitivo y Acusativo', note: 'Con genitivo: "por". Con acusativo: "bajo"' },
      { word: 'ἀντί', case: 'Genitivo', note: 'Siempre con genitivo, significa "en lugar de"' },
      { word: 'ἐπί', case: 'Genitivo, Dativo y Acusativo', note: 'Única que rige los tres casos. Significado varía según caso' }
    ];

    const caseOptions = [
      'Genitivo',
      'Dativo', 
      'Acusativo',
      'Genitivo y Acusativo',
      'Genitivo, Dativo y Acusativo'
    ];

    // Variables del juego
    let currentQuestionIndex = 0;
    let score = 0;
    let gameActive = true;
    let prepositions = [...prepositionsData];

    // Elementos del DOM
    const gameContent = document.getElementById('gameContent');
    const greekWordElement = document.getElementById('greekWord');
    const optionsContainer = document.getElementById('optionsContainer');
    const feedbackElement = document.getElementById('feedback');
    const scoreElement = document.getElementById('score');
    const progressFillElement = document.getElementById('progressFill');
    const counterElement = document.getElementById('counter');
    const nextButton = document.getElementById('nextButton');
    const resetButton = document.getElementById('resetButton');

    // Función para mezclar un array
    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    // Función para cargar una pregunta
    function loadQuestion() {
      if (!gameActive || currentQuestionIndex >= prepositions.length) {
        showGameOver();
        return;
      }

      // Resetear feedback
      feedbackElement.classList.remove('show', 'feedback-correct', 'feedback-incorrect');
      feedbackElement.textContent = '';
      
      // Ocultar botón siguiente
      nextButton.style.display = 'none';

      // Obtener preposición actual
      const currentPrep = prepositions[currentQuestionIndex];
      
      // Mostrar palabra griega
      greekWordElement.textContent = currentPrep.word;
      
      // Actualizar contador y progreso
      counterElement.textContent = `Pregunta ${currentQuestionIndex + 1} de ${prepositions.length}`;
      const progressPercent = ((currentQuestionIndex) / prepositions.length) * 100;
      progressFillElement.style.width = `${progressPercent}%`;
      
      // Preparar opciones de respuesta
      let availableCases = [...caseOptions];
      
      // Asegurarse de que la respuesta correcta esté en las opciones
      if (!availableCases.includes(currentPrep.case)) {
        availableCases.push(currentPrep.case);
      }
      
      // Mezclar y seleccionar 4 opciones
      availableCases = shuffleArray(availableCases).slice(0, 4);
      
      // Si la respuesta correcta no está, reemplazar una aleatoria
      if (!availableCases.includes(currentPrep.case)) {
        const randomIndex = Math.floor(Math.random() * 4);
        availableCases[randomIndex] = currentPrep.case;
      }
      
      // Crear opciones en el DOM
      optionsContainer.innerHTML = '';
      availableCases.forEach(caseOption => {
        const optionCard = document.createElement('div');
        optionCard.className = 'option-card';
        optionCard.innerHTML = `<div class="option-text">${caseOption}</div>`;
        
        optionCard.addEventListener('click', () => checkAnswer(caseOption));
        
        optionsContainer.appendChild(optionCard);
      });
    }

    // Función para verificar la respuesta
    function checkAnswer(selectedCase) {
      if (!gameActive) return;

      const currentPrep = prepositions[currentQuestionIndex];
      const correctCase = currentPrep.case;
      const isCorrect = selectedCase === correctCase;
      
      // Deshabilitar todas las opciones
      const allOptionCards = document.querySelectorAll('.option-card');
      allOptionCards.forEach(card => {
        card.style.pointerEvents = 'none';
      });
      
      // Actualizar puntaje si es correcto
      if (isCorrect) {
        score += 10;
        scoreElement.textContent = score;
        
        feedbackElement.innerHTML = `
          <div>
            <i class="fas fa-check-circle" style="font-size: 1.5rem; margin-right: 10px;"></i>
            <span>¡Correcto!</span>
            <div style="font-size: 1rem; margin-top: 8px; opacity: 0.9;">${currentPrep.note}</div>
          </div>
        `;
        feedbackElement.className = 'feedback-container show feedback-correct';
      } else {
        feedbackElement.innerHTML = `
          <div>
            <i class="fas fa-times-circle" style="font-size: 1.5rem; margin-right: 10px;"></i>
            <span>Respuesta correcta: <strong>${correctCase}</strong></span>
            <div style="font-size: 1rem; margin-top: 8px; opacity: 0.9;">${currentPrep.note}</div>
          </div>
        `;
        feedbackElement.className = 'feedback-container show feedback-incorrect';
      }
      
      // Resaltar opciones correctas e incorrectas
      allOptionCards.forEach(card => {
        const caseText = card.querySelector('.option-text').textContent;
        
        if (caseText === correctCase) {
          card.style.background = 'rgba(39, 174, 96, 0.3)';
          card.style.borderColor = 'var(--success)';
        } else if (caseText === selectedCase && !isCorrect) {
          card.style.background = 'rgba(231, 76, 60, 0.3)';
          card.style.borderColor = 'var(--secondary)';
        }
      });
      
      // Mostrar botón siguiente
      nextButton.style.display = 'flex';
    }

    // Función para pasar a la siguiente pregunta
    function nextQuestion() {
      currentQuestionIndex++;
      
      if (currentQuestionIndex >= prepositions.length) {
        showGameOver();
      } else {
        loadQuestion();
      }
    }

    // Función para mostrar pantalla de fin del juego
    function showGameOver() {
      gameActive = false;
      const totalPossibleScore = prepositions.length * 10;
      const percentage = Math.round((score / totalPossibleScore) * 100);
      
      let message = '';
      if (percentage >= 90) {
        message = '¡Excelente! Dominas las preposiciones griegas.';
      } else if (percentage >= 70) {
        message = '¡Muy bien! Tienes buen conocimiento de las preposiciones.';
      } else if (percentage >= 50) {
        message = '¡Bien hecho! Sigue practicando para mejorar.';
      } else {
        message = '¡Sigue estudiando! La práctica hace al maestro.';
      }
      
      gameContent.innerHTML = `
        <div class="game-over">
          <h2><i class="fas fa-trophy"></i> Juego Completado</h2>
          <div class="final-score">${score} / ${totalPossibleScore}</div>
          <div class="achievement">${percentage}% de aciertos</div>
          <p style="font-size: 1.2rem; margin: 25px 0; color: var(--light);">${message}</p>
          <p style="margin-bottom: 30px; color: var(--light); opacity: 0.9;">
            Has repasado ${prepositions.length} preposiciones del griego koiné. 
            ¡Sigue estudiando la Palabra de Dios!
          </p>
          <div class="action-buttons">
            <button class="btn btn-primary" id="playAgainButton">
              <i class="fas fa-redo"></i> Jugar de nuevo
            </button>
            <button class="btn btn-secondary" id="homeButton">
              <i class="fas fa-home"></i> Volver al Inicio
            </button>
          </div>
        </div>
      `;
      
      // Agregar eventos a los nuevos botones
      document.getElementById('playAgainButton').addEventListener('click', resetGame);
      document.getElementById('homeButton').addEventListener('click', () => {
        window.location.href = '../../home.html';
      });
    }

    // Función para reiniciar el juego
    function resetGame() {
      // Restablecer variables del juego
      currentQuestionIndex = 0;
      score = 0;
      gameActive = true;
      prepositions = shuffleArray([...prepositionsData]);
      
      // Restaurar contenido original del juego
      gameContent.innerHTML = `
        <div class="question-container">
          <div class="question-title">¿Qué caso gramatical rige esta preposición?</div>
          <div class="greek-word" id="greekWord">ἐν</div>
        </div>

        <div class="options-grid" id="optionsContainer"></div>

        <div class="feedback-container" id="feedback"></div>

        <div class="game-info">
          <div class="score-container">
            <i class="fas fa-trophy score-icon"></i>
            <div>
              <div class="score-text">Puntaje</div>
              <div class="score-value" id="score">0</div>
            </div>
          </div>

          <div class="progress-container">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="counter" id="counter">Pregunta 1 de ${prepositions.length}</div>
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn btn-primary" id="nextButton" style="display:none;">
            <i class="fas fa-arrow-right"></i> Siguiente Preposición
          </button>
          <button class="btn btn-secondary" id="resetButton">
            <i class="fas fa-redo"></i> Reiniciar
          </button>
        </div>
      `;
      
      // Volver a cargar los elementos del DOM
      setTimeout(() => {
        // Reasignar referencias a los elementos
        greekWordElement = document.getElementById('greekWord');
        optionsContainer = document.getElementById('optionsContainer');
        feedbackElement = document.getElementById('feedback');
        scoreElement = document.getElementById('score');
        progressFillElement = document.getElementById('progressFill');
        counterElement = document.getElementById('counter');
        nextButton = document.getElementById('nextButton');
        resetButton = document.getElementById('resetButton');
        
        // Reasignar eventos
        nextButton.addEventListener('click', nextQuestion);
        resetButton.addEventListener('click', resetGame);
        
        // Cargar primera pregunta
        loadQuestion();
      }, 10);
    }

    // Inicializar el juego
    function initGame() {
      prepositions = shuffleArray([...prepositionsData]);
      
      // Asignar eventos a los botones
      nextButton.addEventListener('click', nextQuestion);
      resetButton.addEventListener('click', resetGame);
      
      // Cargar primera pregunta
      loadQuestion();
    }

    // Iniciar el juego cuando se carga la página
    document.addEventListener('DOMContentLoaded', initGame);
  </script>
</body>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Declinatio Maximus - Conquista el Futuro Griego</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: radial-gradient(circle at 10% 20%, #2b1b3a, #1a0f2a);
      min-height: 100vh;
      padding: 20px;
      color: #f3e8ff;
    }

    /* Header */
    .hero {
      text-align: center;
      padding: 30px 20px 20px;
    }

    .hero h1 {
      font-size: clamp(2rem, 7vw, 3.5rem);
      font-weight: 800;
      background: linear-gradient(to right, #ffd89b, #c7e9fb, #ffb347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .hero p {
      color: #b9a9e0;
      margin-top: 10px;
    }

    /* Sistema de puntuación con barras */
    .score-system {
      max-width: 500px;
      margin: 20px auto;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      border: 1px solid rgba(255, 180, 70, 0.4);
    }

    .score-circle {
      background: #2d1f42;
      border-radius: 60px;
      padding: 8px 20px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .score-circle i {
      font-size: 1.6rem;
      color: #ffb347;
    }

    .streak {
      background: #1e1233;
      border-radius: 60px;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .streak i {
      color: #ff6b6b;
    }

    /* Tablero de juego estilo matching */
    .game-board {
      max-width: 1200px;
      margin: 30px auto;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .challenge-card {
      background: linear-gradient(115deg, rgba(46, 33, 74, 0.9) 0%, rgba(30, 18, 51, 0.95) 100%);
      border-radius: 36px;
      padding: 25px;
      border: 1px solid rgba(255, 200, 100, 0.3);
      backdrop-filter: blur(4px);
      transition: transform 0.2s;
    }

    .challenge-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 15px;
      border-bottom: 2px dashed #ffb347;
      padding-bottom: 12px;
      flex-wrap: wrap;
    }

    .greek-word {
      font-family: 'Times New Roman', 'Palatino', serif;
      font-size: 2rem;
      background: #00000040;
      padding: 8px 20px;
      border-radius: 60px;
      letter-spacing: 2px;
    }

    .options-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin: 20px 0;
    }

    .match-option {
      background: #2a1b42;
      border-radius: 28px;
      padding: 16px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid #4a3468;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .match-option:hover:not(.matched) {
      background: #ffb347;
      color: #1a0f2a;
      transform: scale(1.02);
      border-color: #ffd966;
    }

    .match-option.matched {
      background: #2e7d32;
      border-color: #4caf50;
      cursor: default;
      opacity: 0.7;
      text-decoration: line-through;
    }

    .match-option.selected {
      background: #ffb347;
      color: #1a0f2a;
      border-color: #ffe082;
      transform: scale(1.02);
    }

    .match-status {
      font-size: 0.85rem;
      margin-top: 12px;
      color: #c4b0e6;
    }

    .next-btn {
      background: linear-gradient(95deg, #ffb347, #ff8c00);
      border: none;
      padding: 14px 32px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1.1rem;
      color: #1a0f2a;
      cursor: pointer;
      margin-top: 20px;
      width: 100%;
      transition: all 0.2s;
    }

    .next-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(255, 140, 0, 0.4);
    }

    .next-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Barra de progreso */
    .progress-bar-container {
      width: 100%;
      background: #2d1f42;
      border-radius: 20px;
      height: 12px;
      margin: 20px 0;
    }

    .progress-fill {
      background: linear-gradient(90deg, #ffb347, #ff6b6b);
      width: 0%;
      height: 100%;
      border-radius: 20px;
      transition: width 0.4s ease;
    }

    /* Modal final */
    .victory-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      animation: fadeInModal 0.5s;
    }

    .victory-card {
      background: linear-gradient(145deg, #2d214a, #1c1138);
      border-radius: 56px;
      padding: 40px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      border: 2px solid gold;
    }

    @keyframes fadeInModal {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 680px) {
      .options-row {
        grid-template-columns: 1fr;
      }
      .challenge-card {
        padding: 18px;
      }
      .greek-word {
        font-size: 1.4rem;
      }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="hero">
    <h1><i class="fas fa-crown"></i> DECLINATIO MAXIMUS <i class="fas fa-scroll"></i></h1>
    <p>⋆ Asocia cada forma griega con su traducción correcta ⋆</p>
  </div>

  <div class="score-system">
    <div class="score-circle"><i class="fas fa-coins"></i> <span id="totalPoints">0</span> pts</div>
    <div class="streak"><i class="fas fa-fire"></i> Racha: <span id="streakCount">0</span></div>
    <div class="streak"><i class="fas fa-check-circle"></i> Aciertos: <span id="correctMatches">0</span>/<span id="totalMatchesCount">0</span></div>
  </div>
  <div class="progress-bar-container"><div class="progress-fill" id="progressFill"></div></div>

  <div class="game-board" id="gameBoard"></div>

  <script>
    // Datos de emparejamientos (griego -> español)
    const matchesData = [
      { greek: "λύσω", spanish: "liberaré", explanation: "Futuro activo de λύω" },
      { greek: "ἀγαπήσω", spanish: "amaré", explanation: "Futuro activo contracto (α→η)" },
      { greek: "βλέψω", spanish: "veré", explanation: "Futuro con oclusiva labial (π+σ→ψ)" },
      { greek: "ἔσομαι", spanish: "seré / estaré", explanation: "Futuro medio deponente de εἰμί" },
      { greek: "γνώσομαι", spanish: "sabré", explanation: "Futuro deponente de γινώσκω" },
      { greek: "μενῶ", spanish: "permaneceré", explanation: "Futuro líquido activo de μένω" },
      { greek: "μενοῦμαι", spanish: "permaneceré (medio)", explanation: "Futuro medio líquido" },
      { greek: "πορεύσομαι", spanish: "iré", explanation: "Futuro medio deponente de πορεύομαι" },
      { greek: "διώξω", spanish: "perseguiré", explanation: "Futuro con velar (κ+σ→ξ)" },
      { greek: "βαπτίσω", spanish: "bautizaré", explanation: "Futuro con dental (τ/δ/θ+σ→σ)" }
    ];

    let currentMatchIndex = 0;
    let score = 0;
    let streak = 0;
    let selectedCard = null;
    let matchLock = false;
    let correctMatchesArr = new Array(matchesData.length).fill(false);
    let totalMatches = matchesData.length;

    const gameBoard = document.getElementById('gameBoard');
    const totalPointsSpan = document.getElementById('totalPoints');
    const streakSpan = document.getElementById('streakCount');
    const correctMatchesSpan = document.getElementById('correctMatches');
    const totalMatchesCountSpan = document.getElementById('totalMatchesCount');
    const progressFill = document.getElementById('progressFill');

    totalMatchesCountSpan.textContent = totalMatches;

    function updateStats() {
      totalPointsSpan.textContent = score;
      streakSpan.textContent = streak;
      const correctCount = correctMatchesArr.filter(v => v === true).length;
      correctMatchesSpan.textContent = correctCount;
      const progressPercent = (correctCount / totalMatches) * 100;
      progressFill.style.width = `${progressPercent}%`;
      
      if (correctCount === totalMatches) {
        showVictory();
      }
    }

    function showVictory() {
      const modal = document.createElement('div');
      modal.className = 'victory-modal';
      modal.innerHTML = `
        <div class="victory-card">
          <i class="fas fa-trophy" style="font-size: 4rem; color: gold;"></i>
          <h2 style="margin: 20px 0;">¡Victoria Imperial!</h2>
          <p style="margin-bottom: 20px;">Has dominado el futuro griego con ${score} puntos.</p>
          <button class="next-btn" id="restartVictoryBtn" style="background: gold; color: #1a0f2a;">🏛️ Jugar de nuevo 🏛️</button>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById('restartVictoryBtn').addEventListener('click', () => {
        modal.remove();
        resetGame();
      });
    }

    function resetGame() {
      currentMatchIndex = 0;
      score = 0;
      streak = 0;
      correctMatchesArr.fill(false);
      selectedCard = null;
      matchLock = false;
      updateStats();
      renderCurrentMatch();
    }

    function renderCurrentMatch() {
      if (correctMatchesArr.every(v => v === true)) return;
      // Encontrar el siguiente no resuelto
      while (currentMatchIndex < totalMatches && correctMatchesArr[currentMatchIndex]) {
        currentMatchIndex++;
      }
      if (currentMatchIndex >= totalMatches) {
        showVictory();
        return;
      }
      
      const current = matchesData[currentMatchIndex];
      // Mezclar opciones: incluimos la correcta + 3 incorrectas aleatorias de otros items
      const otherSpanish = matchesData.filter((_, idx) => idx !== currentMatchIndex && !correctMatchesArr[idx]).map(m => m.spanish);
      let distractors = [...new Set(otherSpanish)].slice(0, 3);
      while (distractors.length < 3) {
        distractors.push("(opción extra)");
      }
      let options = [current.spanish, ...distractors];
      for (let i = options.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [options[i], options[j]] = [options[j], options[i]];
      }

      let html = `
        <div class="challenge-card" data-match-idx="${currentMatchIndex}">
          <div class="challenge-title">
            <i class="fas fa-language"></i>
            <span class="greek-word">${current.greek}</span>
            <span style="font-size: 0.9rem;">↯ elige su significado ↯</span>
          </div>
          <div class="options-row" id="optionsRow-${currentMatchIndex}">
      `;
      
      options.forEach((opt, idx) => {
        html += `<button class="match-option" data-opt-value="${opt.replace(/"/g, '&quot;')}">${opt}</button>`;
      });
      
      html += `</div><div class="match-status" id="statusMsg-${currentMatchIndex}"></div><button class="next-btn" id="nextMatchBtn" disabled>Siguiente →</button></div>`;
      
      gameBoard.innerHTML = html;
      
      // Event listeners
      const btns = document.querySelectorAll('.match-option');
      btns.forEach(btn => {
        btn.addEventListener('click', () => handleGuess(btn, current));
      });
    }
    
    function handleGuess(btn, current) {
      if (matchLock) return;
      const selectedValue = btn.getAttribute('data-opt-value');
      const isCorrect = (selectedValue === current.spanish);
      const statusDiv = document.getElementById(`statusMsg-${currentMatchIndex}`);
      const allOpts = document.querySelectorAll('.match-option');
      
      matchLock = true;
      
      if (isCorrect) {
        // Correcto
        let pointsGain = 10 + (streak * 2);
        score += pointsGain;
        streak++;
        correctMatchesArr[currentMatchIndex] = true;
        btn.classList.add('matched');
        statusDiv.innerHTML = `<i class="fas fa-check-circle"></i> ¡Correcto! ${current.explanation} +${pointsGain} pts. Racha: ${streak}`;
        statusDiv.style.color = "#a5d6a7";
        
        allOpts.forEach(opt => opt.style.cursor = "default");
        allOpts.forEach(opt => opt.disabled = true);
        btn.classList.add('matched');
        
        document.getElementById('nextMatchBtn').disabled = false;
      } else {
        // Incorrecto
        streak = 0;
        score = Math.max(0, score - 5);
        statusDiv.innerHTML = `<i class="fas fa-skull-crossbones"></i> Incorrecto. "${selectedValue}" no es correcto. Era: "${current.spanish}". ${current.explanation} -5 pts`;
        statusDiv.style.color = "#ffb3b3";
        btn.classList.add('selected');
        setTimeout(() => {
          btn.classList.remove('selected');
          matchLock = false;
        }, 1000);
        updateStats();
        matchLock = false;
        return;
      }
      
      updateStats();
      
      // Preparar siguiente
      document.getElementById('nextMatchBtn').addEventListener('click', () => {
        currentMatchIndex++;
        renderCurrentMatch();
      }, { once: true });
    }
    
    renderCurrentMatch();
  </script>
</body>
</html>

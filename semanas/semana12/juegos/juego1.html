<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Futurum Arena - Practica el Futuro en Griego Koiné</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      color: #f1f5f9;
      padding: 20px;
    }

    /* Header del juego */
    .game-header {
      text-align: center;
      padding: 30px 20px 20px;
      position: relative;
    }

    .game-header h1 {
      font-size: clamp(1.8rem, 6vw, 3rem);
      background: linear-gradient(135deg, #fbbf24, #f59e0b, #ef4444);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .game-header h1 i {
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      color: #f59e0b;
    }

    .sub {
      color: #94a3b8;
      font-size: 1rem;
      border-top: 1px solid #334155;
      display: inline-block;
      padding-top: 12px;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 60px;
      padding: 12px 24px;
      margin: 20px auto;
      max-width: 600px;
      border: 1px solid #334155;
      flex-wrap: wrap;
      gap: 15px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0f172a;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
    }

    .stat i {
      font-size: 1.3rem;
    }

    .stat span:first-child {
      color: #94a3b8;
    }

    .stat .value {
      color: #fbbf24;
      font-size: 1.4rem;
      font-weight: 700;
    }

    /* Puntaje y vidas */
    .score {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #0f172a;
    }

    .score .value {
      color: #0f172a;
    }

    .lives {
      background: #1e293b;
      border: 1px solid #ef4444;
    }

    .lives i {
      color: #ef4444;
    }

    /* Contenedor de preguntas */
    .quiz-container {
      max-width: 900px;
      margin: 0 auto 40px;
    }

    .question-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-radius: 32px;
      padding: 30px;
      margin-bottom: 25px;
      border: 1px solid #334155;
      transition: all 0.3s ease;
      box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.5);
    }

    .question-card.correct-highlight {
      border-left: 6px solid #22c55e;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
    }

    .question-card.wrong-highlight {
      border-left: 6px solid #ef4444;
    }

    .question-text {
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      font-weight: 600;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .question-text .greek {
      font-family: 'Times New Roman', 'Palatino', serif;
      font-size: 1.6rem;
      background: #2d3a5e;
      padding: 5px 15px;
      border-radius: 40px;
      letter-spacing: 2px;
    }

    .badge {
      background: #f59e0b;
      color: #0f172a;
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: bold;
    }

    /* Opciones estilo moderno */
    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .option-btn {
      background: #2d3748;
      border: 2px solid #4a5568;
      border-radius: 20px;
      padding: 16px 20px;
      font-size: 1rem;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option-btn:hover:not(:disabled) {
      background: #3b4a6b;
      border-color: #f59e0b;
      transform: translateX(8px);
    }

    .option-btn.selected {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border-color: #fbbf24;
      color: #0f172a;
      font-weight: 600;
    }

    .option-btn.correct-answer {
      background: #22c55e;
      border-color: #22c55e;
      color: white;
    }

    .option-btn.wrong-answer {
      background: #ef4444;
      border-color: #ef4444;
      color: white;
      text-decoration: line-through;
    }

    .option-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .prefix {
      font-weight: 800;
      font-size: 1.2rem;
      width: 30px;
    }

    /* Feedback */
    .feedback {
      padding: 15px;
      border-radius: 20px;
      margin-top: 15px;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideUp 0.3s ease;
    }

    .feedback.correct {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid #22c55e;
      color: #bbf7d0;
    }

    .feedback.wrong {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid #ef4444;
      color: #fecaca;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Controles */
    .game-controls {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 30px auto;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 32px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #0f172a;
    }

    .btn-primary:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
    }

    .btn-secondary {
      background: #334155;
      color: #f1f5f9;
    }

    .btn-secondary:hover {
      background: #475569;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Resultados finales */
    .results-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(15px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.4s ease;
    }

    .results-card {
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border-radius: 48px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      border: 1px solid #f59e0b;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6);
    }

    .results-card h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .final-score {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 20px 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .question-card {
        padding: 20px;
      }
      .options-grid {
        grid-template-columns: 1fr;
      }
      .stats-bar {
        flex-direction: column;
        border-radius: 28px;
      }
      .stat {
        width: 100%;
        justify-content: center;
      }
      .btn {
        padding: 12px 24px;
      }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="game-header">
    <h1><i class="fas fa-dragon"></i> FUTURUM ARENA <i class="fas fa-helmet-battle"></i></h1>
    <div class="sub">⚡ Domina el futuro activo, medio y los verbos líquidos en griego koiné</div>
  </div>

  <div class="stats-bar">
    <div class="stat score"><i class="fas fa-star"></i><span>PUNTUACIÓN</span><span class="value" id="scoreValue">0</span></div>
    <div class="stat lives"><i class="fas fa-heart"></i><span>VIDAS</span><span class="value" id="livesValue">3</span></div>
    <div class="stat"><i class="fas fa-question-circle"></i><span>PREGUNTA</span><span class="value" id="currentQ">1</span><span>/<span id="totalQ">10</span></span></div>
  </div>

  <div class="quiz-container" id="quizContainer"></div>

  <div class="game-controls">
    <button class="btn btn-secondary" id="resetBtn"><i class="fas fa-undo-alt"></i> Reiniciar Juego</button>
  </div>

  <script>
    // Base de datos de preguntas sobre el futuro en griego
    const questions = [
      {
        text: "¿Qué formante temporal se usa para formar el futuro activo indicativo en verbos regulares?",
        options: ["-ω-", "-σ- (sigma)", "-κ- (kappa)", "-τ- (tau)"],
        correct: 1,
        explanation: "El futuro se forma añadiendo sigma (σ) entre la raíz y la vocal de conexión. Ej: λύω → λύσω"
      },
      {
        text: "¿Cómo se traduce correctamente 'ἀγαπήσω'?",
        options: ["Yo amo", "Yo amaba", "Yo amaré", "Yo he amado"],
        correct: 2,
        explanation: "ἀγαπήσω es la 1ª persona singular del futuro activo de ἀγαπάω → 'amaré'"
      },
      {
        text: "¿Qué sucede con la vocal contracta de los verbos en -άω al formar el futuro (ej. ἀγαπάω → ἀγαπήσω)?",
        options: ["Se alarga a η (eta)", "Se convierte en ω (omega)", "Desaparece", "Se duplica"],
        correct: 0,
        explanation: "La α se alarga a η ante el formante temporal sigma: ἀγαπα + σ + ω → ἀγαπήσω"
      },
      {
        text: "¿Cuál es la forma correcta del futuro activo de 'βλέπω' (ver)?",
        options: ["βλέπσω", "βλέψω", "βλεπήσω", "βλέξω"],
        correct: 1,
        explanation: "βλέπω tiene raíz βλεπ- (labial π). π + σ → ψ, entonces βλέψω"
      },
      {
        text: "¿Qué tipo de verbo es 'ἔσομαι'?",
        options: ["Futuro activo de εἰμί", "Futuro medio deponente de εἰμί", "Presente medio de εἰμί", "Aoristo de εἰμί"],
        correct: 1,
        explanation: "ἔσομαι es el futuro medio deponente de εἰμί (ser/estar). Se traduce 'seré/estaré'"
      },
      {
        text: "¿Qué caracteriza a los 'verbos líquidos' en la formación del futuro?",
        options: ["Pierden la sigma intervocálica y contraen", "Añaden una sigma extra", "Duplican la consonante líquida", "No tienen futuro"],
        correct: 0,
        explanation: "Los futuros líquidos añaden εσ, la sigma desaparece entre vocales y luego hay contracción. Ej: μένω → μενῶ"
      },
      {
        text: "Si encuentras la forma 'μενοῦμεν' ¿de qué verbo proviene y qué tiempo es?",
        options: ["μένω, presente", "μένω, futuro líquido activo", "μένω, aoristo", "μείνω, futuro"],
        correct: 1,
        explanation: "μενοῦμεν es 1ª plural del futuro líquido activo de μένω (permaneceremos)."
      },
      {
        text: "¿Qué significa 'γνώσομαι'?",
        options: ["Yo sabré", "Yo supe", "Yo conozco", "Yo seré conocido"],
        correct: 0,
        explanation: "γνώσομαι es el futuro medio deponente de γινώσκω (conocer/saber) → 'sabré'"
      },
      {
        text: "Según el 'Patrón 1' de formación del futuro, ¿qué relación hay entre la raíz de presente y la raíz de futuro?",
        options: ["Son completamente diferentes", "Son la misma raíz", "La raíz de futuro es siempre más larga", "Solo cambian las vocales"],
        correct: 1,
        explanation: "En el Patrón 1, la raíz del futuro activo es idéntica a la raíz del presente."
      },
      {
        text: "¿Cuál es la forma correcta del futuro medio líquido de 'μένω' para la 3ª persona plural?",
        options: ["μενοῦσι", "μενοῦνται", "μενεῖται", "μενούμεθα"],
        correct: 1,
        explanation: "La 3ª plural del futuro medio líquido de μένω es μενοῦνται (ellos permanecerán)."
      }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let lives = 3;
    let answered = false;
    let selectedOption = null;
    let gameActive = true;

    const quizContainer = document.getElementById('quizContainer');
    const scoreSpan = document.getElementById('scoreValue');
    const livesSpan = document.getElementById('livesValue');
    const currentQSpan = document.getElementById('currentQ');
    const totalQSpan = document.getElementById('totalQ');

    totalQSpan.textContent = questions.length;

    function updateUI() {
      scoreSpan.textContent = score;
      livesSpan.textContent = lives;
      currentQSpan.textContent = currentQuestionIndex + 1;
    }

    function showResults() {
      const percentage = Math.round((score / questions.length) * 100);
      let message = "";
      if (percentage >= 90) message = "🏆 ¡Excelente! Eres un verdadero héroe del griego koiné. 🏆";
      else if (percentage >= 70) message = "🌟 ¡Muy bien! Sigue practicando para alcanzar la gloria. 🌟";
      else if (percentage >= 50) message = "📖 Buen intento. Revisa los futuros líquidos y los patrones. 📖";
      else message = "⚔️ Necesitas más entrenamiento en el Futurum Arena. ¡Reinicia y vuelve a intentarlo! ⚔️";

      const modal = document.createElement('div');
      modal.className = 'results-modal';
      modal.innerHTML = `
        <div class="results-card">
          <i class="fas fa-trophy" style="font-size: 4rem; color: #fbbf24;"></i>
          <h2>¡Batalla Finalizada!</h2>
          <div class="final-score">${score} / ${questions.length}</div>
          <p style="margin-bottom: 20px;">${message}</p>
          <button class="btn btn-primary" id="closeResultsBtn" style="margin: 0 auto;"><i class="fas fa-play"></i> Jugar de nuevo</button>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById('closeResultsBtn').addEventListener('click', () => {
        modal.remove();
        resetGame();
      });
    }

    function checkGameOver() {
      if (lives <= 0) {
        gameActive = false;
        showResults();
      }
    }

    function loadQuestion() {
      if (!gameActive) return;
      if (currentQuestionIndex >= questions.length) {
        showResults();
        return;
      }
      answered = false;
      selectedOption = null;
      const q = questions[currentQuestionIndex];
      const isGreekQuestion = q.text.includes('ἀγαπήσω') || q.text.includes('βλέπω') || q.text.includes('μενοῦμεν') || q.text.includes('ἔσομαι');
      
      let html = `
        <div class="question-card" id="questionCard">
          <div class="question-text">
            <span class="badge"><i class="fas fa-bolt"></i> Desafío ${currentQuestionIndex + 1}</span>
            <span class="greek">${isGreekQuestion ? '🇬🇷' : '📖'}</span>
            <span>${q.text}</span>
          </div>
          <div class="options-grid" id="optionsGrid">
      `;
      
      q.options.forEach((opt, idx) => {
        const letter = String.fromCharCode(65 + idx);
        html += `
          <button class="option-btn" data-opt-index="${idx}">
            <span class="prefix">${letter}.</span>
            <span>${opt}</span>
          </button>
        `;
      });
      
      html += `</div><div class="feedback" id="feedback"></div></div>`;
      quizContainer.innerHTML = html;
      
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', () => selectAnswer(parseInt(btn.dataset.optIndex)));
      });
      updateUI();
    }

    function selectAnswer(optIndex) {
      if (answered || !gameActive) return;
      answered = true;
      const q = questions[currentQuestionIndex];
      const isCorrect = (optIndex === q.correct);
      
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.disabled = true);
      
      if (isCorrect) {
        score += 10;
        updateUI();
        document.querySelectorAll('.option-btn')[optIndex].classList.add('correct-answer');
        document.getElementById('feedback').innerHTML = `<i class="fas fa-check-circle"></i> ¡Correcto! ${q.explanation}`;
        document.getElementById('feedback').className = 'feedback correct';
        document.getElementById('questionCard').classList.add('correct-highlight');
      } else {
        lives--;
        updateUI();
        document.querySelectorAll('.option-btn')[optIndex].classList.add('wrong-answer');
        document.querySelectorAll('.option-btn')[q.correct].classList.add('correct-answer');
        document.getElementById('feedback').innerHTML = `<i class="fas fa-times-circle"></i> Incorrecto. ${q.explanation}`;
        document.getElementById('feedback').className = 'feedback wrong';
        document.getElementById('questionCard').classList.add('wrong-highlight');
        checkGameOver();
      }
      
      setTimeout(() => {
        if (gameActive && lives > 0) {
          currentQuestionIndex++;
          if (currentQuestionIndex < questions.length) {
            loadQuestion();
          } else {
            showResults();
          }
        } else if (lives <= 0) {
          // ya se mostró game over
        } else {
          showResults();
        }
      }, 1800);
    }

    function resetGame() {
      currentQuestionIndex = 0;
      score = 0;
      lives = 3;
      answered = false;
      gameActive = true;
      updateUI();
      loadQuestion();
    }

    document.getElementById('resetBtn').addEventListener('click', resetGame);
    loadQuestion();
  </script>
</body>
</html>

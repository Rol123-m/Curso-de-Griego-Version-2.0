<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aorist Arena - Domina el Aoristo Segundo Griego</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: linear-gradient(145deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
            color: #f0f0f0;
        }

        /* Header */
        .game-header {
            text-align: center;
            padding: 20px 20px 10px;
        }

        .game-header h1 {
            font-size: clamp(1.6rem, 7vw, 3rem);
            background: linear-gradient(135deg, #ffd89b, #c7e9fb, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .sub {
            color: #b8b0ff;
            font-size: 0.9rem;
            margin-top: 8px;
            border-bottom: 1px solid #4a3f7c;
            display: inline-block;
            padding-bottom: 8px;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 12, 41, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 12px 24px;
            margin: 20px auto;
            max-width: 750px;
            border: 1px solid #ffb347;
            flex-wrap: wrap;
            gap: 12px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a163f;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 600;
        }

        .stat i {
            font-size: 1.2rem;
        }

        .stat .value {
            color: #ffb347;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .score { background: linear-gradient(135deg, #ffb347, #ff8c00); color: #0f0c29; }
        .score .value { color: #0f0c29; }
        .lives { border: 1px solid #ff6b6b; }
        .lives i { color: #ff6b6b; }

        /* Contenedor de preguntas */
        .quiz-container {
            max-width: 950px;
            margin: 0 auto 40px;
        }

        .question-card {
            background: linear-gradient(135deg, #1e1a4e 0%, #0f0c29 100%);
            border-radius: 32px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid #4a3f7c;
            transition: all 0.3s ease;
            box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.5);
        }

        .question-card.correct-highlight {
            border-left: 6px solid #4caf50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.2);
        }

        .question-card.wrong-highlight {
            border-left: 6px solid #f44336;
        }

        .question-text {
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge {
            background: #ffb347;
            color: #0f0c29;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .greek-highlight {
            font-family: 'Times New Roman', 'Palatino', serif;
            font-size: 1.4rem;
            background: #2a245e;
            padding: 6px 16px;
            border-radius: 40px;
            letter-spacing: 1px;
        }

        /* Opciones */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: #1e1a4e;
            border: 2px solid #4a3f7c;
            border-radius: 20px;
            padding: 14px 18px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #e0d4ff;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option-btn:hover:not(:disabled) {
            background: #ffb347;
            border-color: #ffb347;
            color: #0f0c29;
            transform: translateX(8px);
        }

        .option-btn.selected {
            background: linear-gradient(135deg, #ffb347, #ff8c00);
            border-color: #ffb347;
            color: #0f0c29;
            font-weight: 600;
        }

        .option-btn.correct-answer {
            background: #4caf50;
            border-color: #4caf50;
            color: white;
        }

        .option-btn.wrong-answer {
            background: #f44336;
            border-color: #f44336;
            color: white;
            text-decoration: line-through;
        }

        .option-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .prefix {
            font-weight: 800;
            font-size: 1.1rem;
            width: 28px;
        }

        /* Feedback */
        .feedback {
            padding: 14px;
            border-radius: 20px;
            margin-top: 15px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideUp 0.3s ease;
        }

        .feedback.correct {
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid #4caf50;
            color: #c8e6c9;
        }

        .feedback.wrong {
            background: rgba(244, 67, 54, 0.15);
            border: 1px solid #f44336;
            color: #ffcdd2;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Botones */
        .game-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px auto;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffb347, #ff8c00);
            color: #0f0c29;
        }

        .btn-primary:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(255, 179, 71, 0.5);
        }

        .btn-secondary {
            background: #2a245e;
            color: #e0d4ff;
            border: 1px solid #4a3f7c;
        }

        .btn-secondary:hover {
            background: #3d3578;
        }

        /* Modal final */
        .results-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.4s ease;
        }

        .results-card {
            background: linear-gradient(145deg, #1e1a4e, #0f0c29);
            border-radius: 48px;
            padding: 35px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            border: 2px solid #ffb347;
        }

        .results-card h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd89b, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 20px 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 640px) {
            .question-card { padding: 20px; }
            .options-grid { grid-template-columns: 1fr; }
            .stats-bar { flex-direction: column; border-radius: 28px; }
            .stat { width: 100%; justify-content: center; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="game-header">
        <h1><i class="fas fa-greek-temple"></i> AORIST ARENA <i class="fas fa-helmet-battle"></i></h1>
        <div class="sub">🏺 Conquista el aoristo segundo - El pasado indefinido del griego 🏺</div>
    </div>

    <div class="stats-bar">
        <div class="stat score"><i class="fas fa-coins"></i><span>PUNTOS</span><span class="value" id="scoreValue">0</span></div>
        <div class="stat lives"><i class="fas fa-heart"></i><span>VIDAS</span><span class="value" id="livesValue">3</span></div>
        <div class="stat"><i class="fas fa-question-circle"></i><span>PREGUNTA</span><span class="value" id="currentQ">1</span><span>/<span id="totalQ">12</span></span></div>
    </div>

    <div class="quiz-container" id="quizContainer"></div>

    <div class="game-controls">
        <button class="btn btn-secondary" id="resetBtn"><i class="fas fa-undo-alt"></i> Reiniciar Juego</button>
    </div>

    <script>
        const questions = [
            { text: "¿Qué significa la palabra 'aoristo' (ἀόριστος)?", options: ["Continuo", "Indefinido / sin marca", "Perfecto", "Futuro"], correct: 1, explanation: "ἀόριστος significa 'no delimitado' o 'sin marca'." },
            { text: "¿Qué aspecto describe el aoristo?", options: ["Acción continua en el pasado", "Acción puntual o indefinida en el pasado", "Acción futura", "Acción completada con efecto presente"], correct: 1, explanation: "El aoristo describe una acción pasada sin especificar duración o progresión." },
            { text: "¿Cuál es la 1ª persona singular del aoristo segundo activo de λαμβάνω?", options: ["ἔλαβον", "ἐλάμβανον", "λήμψομαι", "ἔλυσα"], correct: 0, explanation: "ἔλαβον es la 1ª sg del aoristo segundo activo de λαμβάνω." },
            { text: "¿Qué elemento NO forma parte del aoristo segundo activo?", options: ["Aumento (ἐ-)", "Desinencias secundarias", "Formante -σα-", "Vocal de conexión"], correct: 2, explanation: "El aoristo segundo NO usa el formante -σα- (eso es el primer aoristo)." },
            { text: "¿Cuál es la 1ª persona singular del aoristo segundo medio de γίνομαι?", options: ["ἐγινόμην", "ἐγενόμην", "γενήσομαι", "γίνομαι"], correct: 1, explanation: "ἐγενόμην es la 1ª sg del aoristo segundo medio deponente de γίνομαι." },
            { text: "¿Cómo se traduce correctamente 'ἐγενόμην'?", options: ["Yo era", "Yo llegué a ser / fui", "Yo seré", "Yo soy"], correct: 1, explanation: "ἐγενόμην es aoristo medio deponente de γίνομαι → 'llegué a ser'." },
            { text: "¿En qué posición del léxico aparece la forma del aoristo activo?", options: ["Primera", "Segunda", "Tercera", "Cuarta"], correct: 2, explanation: "El aoristo activo es la tercera forma principal en el léxico." },
            { text: "¿Cuál es la diferencia clave entre imperfecto y aoristo segundo?", options: ["Las desinencias", "La raíz temporal", "El aumento", "La voz"], correct: 1, explanation: "La única diferencia suele ser la raíz: imperfecto usa raíz de presente, aoristo usa raíz aoristo." },
            { text: "¿Qué vocal de conexión usa la 2ª persona singular del aoristo segundo?", options: ["ο", "ε", "α", "η"], correct: 1, explanation: "La 2ª sg usa ε como vocal de conexión (ej. ἔλαβες)." },
            { text: "¿Cuál es la forma correcta del aoristo segundo de λέγω (decir)?", options: ["ἔλεγον", "λέξω", "εἶπον", "λέγω"], correct: 2, explanation: "εἶπον es el aoristo segundo irregular de λέγω." },
            { text: "¿Qué indica una forma que termina en -ομην en el léxico?", options: ["Presente deponente", "Futuro medio", "Aoristo medio deponente", "Imperfecto activo"], correct: 2, explanation: "La tercera forma terminada en -ομην indica aoristo medio deponente." },
            { text: "¿Cuál es el aoristo segundo de γινώσκω (conocer)?", options: ["ἔγινωσκον", "ἔγνων", "γνώσομαι", "ἔγνωκα"], correct: 1, explanation: "ἔγνων es la forma del aoristo segundo de γινώσκω." }
        ];

        let currentIndex = 0, score = 0, lives = 3, answered = false, gameActive = true;
        const quizContainer = document.getElementById('quizContainer');
        const scoreSpan = document.getElementById('scoreValue');
        const livesSpan = document.getElementById('livesValue');
        const currentQSpan = document.getElementById('currentQ');
        const totalQSpan = document.getElementById('totalQ');

        totalQSpan.textContent = questions.length;

        function updateUI() {
            scoreSpan.textContent = score;
            livesSpan.textContent = lives;
            currentQSpan.textContent = currentIndex + 1;
        }

        function showResults() {
            const percent = Math.round((score / (questions.length * 10)) * 100);
            let msg = percent >= 80 ? "🏆 ¡Héroe del Aoristo! Dominas el tiempo pasado indefinido. 🏆" : percent >= 60 ? "📜 Buen trabajo. ¡Sigue practicando!" : "⚔️ Necesitas más entrenamiento en la Aorist Arena. ¡Reinicia y vuelve a intentarlo!";
            const modal = document.createElement('div');
            modal.className = 'results-modal';
            modal.innerHTML = `<div class="results-card"><i class="fas fa-trophy" style="font-size: 3.5rem; color: #ffb347;"></i><h2>Batalla Finalizada</h2><div class="final-score">${score} / ${questions.length * 10}</div><p>${msg}</p><button class="btn btn-primary" id="closeResultsBtn" style="margin-top: 20px;"><i class="fas fa-play"></i> Jugar de nuevo</button></div>`;
            document.body.appendChild(modal);
            document.getElementById('closeResultsBtn').addEventListener('click', () => { modal.remove(); resetGame(); });
        }

        function checkGameOver() { if (lives <= 0 && gameActive) { gameActive = false; showResults(); } }

        function loadQuestion() {
            if (!gameActive) return;
            if (currentIndex >= questions.length) { showResults(); return; }
            answered = false;
            const q = questions[currentIndex];
            let html = `<div class="question-card" id="questionCard"><div class="question-text"><span class="badge"><i class="fas fa-greek-temple"></i> Desafío ${currentIndex+1}</span><span class="greek-highlight">${q.text.includes('λαμβάνω') || q.text.includes('γίνομαι') ? '🇬🇷' : '⚔️'}</span><span>${q.text}</span></div><div class="options-grid" id="optionsGrid">`;
            q.options.forEach((opt, idx) => { html += `<button class="option-btn" data-opt-index="${idx}"><span class="prefix">${String.fromCharCode(65+idx)}.</span><span>${opt}</span></button>`; });
            html += `</div><div class="feedback" id="feedback"></div></div>`;
            quizContainer.innerHTML = html;
            document.querySelectorAll('.option-btn').forEach(btn => btn.addEventListener('click', () => selectAnswer(parseInt(btn.dataset.optIndex))));
            updateUI();
        }

        function selectAnswer(optIndex) {
            if (answered || !gameActive) return;
            answered = true;
            const q = questions[currentIndex];
            const isCorrect = (optIndex === q.correct);
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(btn => btn.disabled = true);
            if (isCorrect) {
                score += 10;
                updateUI();
                btns[optIndex].classList.add('correct-answer');
                document.getElementById('feedback').innerHTML = `<i class="fas fa-check-circle"></i> ¡Correcto! ${q.explanation}`;
                document.getElementById('feedback').className = 'feedback correct';
                document.getElementById('questionCard').classList.add('correct-highlight');
            } else {
                lives--;
                updateUI();
                btns[optIndex].classList.add('wrong-answer');
                btns[q.correct].classList.add('correct-answer');
                document.getElementById('feedback').innerHTML = `<i class="fas fa-times-circle"></i> Incorrecto. ${q.explanation}`;
                document.getElementById('feedback').className = 'feedback wrong';
                document.getElementById('questionCard').classList.add('wrong-highlight');
                checkGameOver();
            }
            setTimeout(() => {
                if (gameActive && lives > 0) { currentIndex++; loadQuestion(); }
                else if (lives <= 0) { if (!document.querySelector('.results-modal')) showResults(); }
                else if (currentIndex >= questions.length) showResults();
            }, 1800);
        }

        function resetGame() { currentIndex = 0; score = 0; lives = 3; answered = false; gameActive = true; updateUI(); loadQuestion(); }
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        loadQuestion();
    </script>
</body>
</html>
